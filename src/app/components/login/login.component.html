<div class="wrapper">
  <div *ngIf="!loading" class="body">
    <img class="logo" src="../../../assets/img/login.png" alt="img login">
    <h1 class="mb-2">Login</h1>
    <div class="form-floating mb-3 mt-3">
      <input type="text" [(ngModel)]="login" class="form-control" id="floatingInput" placeholder="Ingrese Usuario">
      <label>Usuario</label>
    </div>
    <div class="form-floating mb-3">
      <input type="password" [(ngModel)]="password" class="form-control" id="floatingInput" placeholder="Password">
      <label>Password</label>
    </div>
    <div class="d-grid gap-2">
      <button type="button" class="btn btn-info btn-lg" (click)="loginUser()">Ingresar</button>
    </div>
    <p class="mt-3">No tienes cuenta? <a routerLink="/signIn">Registrar</a></p>
  </div>
  <app-spinner *ngIf="loading"></app-spinner>
</div>
